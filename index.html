<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GPX Route Animator</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0f14;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  -webkit-font-smoothing:antialiased;color:#fff}

/* === KARTE === */
#map{width:100%;height:100%;position:absolute;top:0;left:0;opacity:0;transition:opacity 1s ease}
#map.visible{opacity:1}
.maplibregl-ctrl-attrib{font-size:7px!important;background:rgba(255,255,255,.35)!important;
  padding:1px 4px!important;opacity:.25}
.maplibregl-ctrl-logo,.maplibregl-ctrl-attrib-button{display:none!important}
.maplibregl-ctrl-top-right,.maplibregl-ctrl-top-left,.maplibregl-ctrl-bottom-left{display:none!important}

/* === SETUP SCREEN === */
#setup{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#0b0f14;padding:32px;
  transition:opacity .7s ease,visibility .7s ease}
#setup.hidden{opacity:0;visibility:hidden;pointer-events:none}
#setup h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px;text-align:center}
#setup .sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:40px;text-align:center;line-height:1.5}

/* === FILE PICKER: Input direkt im Label, unsichtbar aber touch-tauglich === */
.pick-wrap{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;max-width:320px;padding:18px 24px;
  background:linear-gradient(135deg,#4ECDC4,#2BAF9E);
  color:#fff;font-size:17px;font-weight:600;
  border-radius:16px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 24px rgba(78,205,196,.3);
  position:relative;
}
.pick-wrap svg{width:22px;height:22px;flex-shrink:0;pointer-events:none}
.pick-wrap span{pointer-events:none}

/*
  KRITISCH für Mobile:
  - Der Input muss ÜBER allem liegen (z-index:999)
  - Nicht overflow:hidden auf dem Parent (verhindert Touch auf iOS)
  - opacity:0.001 statt 0 (manche Browser skippen opacity:0 bei Touch)
  - Mindestens font-size:16px (iOS Safari ignoriert sonst Touch)
  - touch-action:manipulation (verhindert 300ms Delay)
*/
.pick-wrap input[type="file"]{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  opacity:0.001;
  cursor:pointer;
  z-index:999;
  font-size:16px;
  touch-action:manipulation;
  -webkit-appearance:none;
}

/* === FILE INFO === */
#file-info{margin-top:20px;font-size:13px;color:rgba(255,255,255,.5);
  text-align:center;min-height:20px;max-width:320px;word-break:break-word}
#file-info.error{color:#FF6B6B}
#file-info.success{color:#4ECDC4}

/* === OPTIONEN === */
#options{margin-top:28px;width:100%;max-width:320px;display:none}
#options.visible{display:block}
.opt-row{display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.opt-row span{font-size:14px;color:rgba(255,255,255,.7)}
.opt-row select{background:rgba(255,255,255,.08);color:#fff;
  border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;font-size:13px}

/* === START BUTTON === */
#go-btn{display:none;width:100%;max-width:320px;margin-top:24px;padding:18px 24px;
  background:linear-gradient(135deg,#FF6B35,#E85D2C);color:#fff;font-size:17px;
  font-weight:600;border:none;border-radius:16px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s ease,box-shadow .15s ease;
  box-shadow:0 4px 24px rgba(255,107,53,.3)}
#go-btn.visible{display:block}
#go-btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(255,107,53,.2)}

/* === STATS === */
#stats{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:24px;padding:10px 24px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:18px;border:1px solid rgba(255,255,255,.07);
  opacity:0;transition:opacity .6s ease;pointer-events:none}
#stats.visible{opacity:1}
.st{text-align:center}
.st .v{font-size:17px;font-weight:700;letter-spacing:-.3px}
.st .l{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1.2px;margin-top:2px}

/* === FORTSCHRITT === */
#prog{position:fixed;bottom:0;left:0;height:3px;width:0%;
  background:linear-gradient(90deg,#4ECDC4,#FF6B35);z-index:200;
  box-shadow:0 0 10px rgba(78,205,196,.4);transition:width .05s linear}

/* === COUNTDOWN === */
#cd{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;
  background:rgba(11,15,20,.85);opacity:0;visibility:hidden;
  transition:opacity .3s ease,visibility .3s ease}
#cd.vis{opacity:1;visibility:visible}
#cd .n{font-size:72px;font-weight:800;color:#4ECDC4;animation:cp .6s ease}
@keyframes cp{0%{transform:scale(1.4);opacity:0}50%{opacity:1}100%{transform:scale(1);opacity:1}}

.icon-rt{width:72px;height:72px;margin-bottom:28px;opacity:.85}
</style>
</head>
<body>

<!-- ======= SETUP ======= -->
<div id="setup">
  <svg class="icon-rt" viewBox="0 0 72 72" fill="none">
    <circle cx="14" cy="14" r="6" fill="#4ECDC4"/>
    <circle cx="58" cy="58" r="6" fill="#FF6B35"/>
    <path d="M14 20 C14 38,58 34,58 52" stroke="url(#rg)" stroke-width="3.5"
          stroke-linecap="round" fill="none" stroke-dasharray="6 4"/>
    <defs><linearGradient id="rg" x1="14" y1="14" x2="58" y2="58">
      <stop stop-color="#4ECDC4"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient></defs>
  </svg>

  <h1>Route Animator</h1>
  <p class="sub">GPX-Datei laden, dann Screen Recording starten.<br>Die Animation läuft vollautomatisch.</p>

  <!--
    MOBILER FILE-PICKER:
    Das <input type="file"> liegt direkt im <label>, unsichtbar
    aber mit voller Größe über dem sichtbaren Button.
    Kein for=/id= nötig. Kein JS click()-Hack.
    Der Tap trifft direkt den nativen File-Input.
  -->
  <label class="pick-wrap">
    <input type="file" id="gpx-input" accept=".gpx,.xml">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    <span>GPX-Datei auswählen</span>
  </label>

  <div id="file-info"></div>

  <div id="options">
    <div class="opt-row"><span>Dauer</span>
      <select id="opt-dur">
        <option value="8000">8 Sek</option>
        <option value="12000" selected>12 Sek</option>
        <option value="18000">18 Sek</option>
        <option value="25000">25 Sek</option>
        <option value="35000">35 Sek</option>
      </select>
    </div>
    <div class="opt-row"><span>Kamerawinkel</span>
      <select id="opt-pitch">
        <option value="0">Draufsicht</option>
        <option value="35">Leicht geneigt</option>
        <option value="50" selected>3D-Perspektive</option>
        <option value="60">Starke Neigung</option>
      </select>
    </div>
    <div class="opt-row"><span>Wiederholung</span>
      <select id="opt-loop">
        <option value="1" selected>Endlosschleife</option>
        <option value="0">Einmal</option>
      </select>
    </div>
  </div>

  <button id="go-btn">▶︎ Animation starten</button>
</div>

<!-- ======= COUNTDOWN ======= -->
<div id="cd"><div class="n" id="cd-n"></div></div>

<!-- ======= MAP ======= -->
<div id="map"></div>

<!-- ======= STATS ======= -->
<div id="stats">
  <div class="st"><div class="v" id="s-d">—</div><div class="l">km</div></div>
  <div class="st"><div class="v" id="s-e">—</div><div class="l">Hm ↑</div></div>
</div>
<div id="prog"></div>

<script>
/* ============ CONFIG ============ */
const C = {
  style:'https://tiles.openfreemap.org/styles/liberty',
  dur:12000, restPause:3500, loop:true, pitch:50,
  pad:{top:80,bottom:110,left:40,right:40},
  rotDeg:35,
  lineCol:'#FF6B35', lineW:5,
  glowCol:'rgba(255,107,53,0.25)', glowW:16,
  dotCol:'#4ECDC4',
};

/* ============ STATE ============ */
let map=null, coords=[], animStart=null;

/* ============ GPX PARSER ============ */
function parseGPX(txt){
  const doc=new DOMParser().parseFromString(txt,'application/xml');
  if(doc.querySelector('parsererror')) throw new Error('Ungültige GPX-Datei');
  const out=[];
  let pts=doc.querySelectorAll('trkpt');
  if(!pts.length) pts=doc.querySelectorAll('rtept');
  if(!pts.length) pts=doc.querySelectorAll('wpt');
  pts.forEach(p=>{
    const lat=parseFloat(p.getAttribute('lat'));
    const lon=parseFloat(p.getAttribute('lon'));
    const eN=p.querySelector('ele');
    const ele=eN?parseFloat(eN.textContent):0;
    if(!isNaN(lat)&&!isNaN(lon)) out.push([lon,lat,ele]);
  });
  if(out.length<2) throw new Error('Zu wenig Punkte (min. 2)');
  return out;
}

/* ============ ANALYSE ============ */
function analyze(c){
  let dist=0,up=0;
  for(let i=1;i<c.length;i++){
    const R=6371000,dLat=(c[i][1]-c[i-1][1])*Math.PI/180,dLon=(c[i][0]-c[i-1][0])*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(c[i-1][1]*Math.PI/180)*Math.cos(c[i][1]*Math.PI/180)*Math.sin(dLon/2)**2;
    dist+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    const dE=c[i][2]-c[i-1][2]; if(dE>0) up+=dE;
  }
  return {km:(dist/1000).toFixed(1),hm:Math.round(up)};
}

/* ============ BOUNDS + BEARING ============ */
function getBounds(c){
  let a=[Infinity,Infinity],b=[-Infinity,-Infinity];
  c.forEach(([x,y])=>{if(x<a[0])a[0]=x;if(y<a[1])a[1]=y;if(x>b[0])b[0]=x;if(y>b[1])b[1]=y});
  return[a,b];
}
function getBearing(a,b){
  const dL=(b[0]-a[0])*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(b[1]*Math.PI/180);
  const x=Math.cos(a[1]*Math.PI/180)*Math.sin(b[1]*Math.PI/180)-
          Math.sin(a[1]*Math.PI/180)*Math.cos(b[1]*Math.PI/180)*Math.cos(dL);
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ============ SUBLINE ============ */
function subLine(c,f){
  if(f<=0)return[c[0]];if(f>=1)return c;
  const segs=[];let tot=0;
  for(let i=1;i<c.length;i++){
    const d=Math.sqrt((c[i][0]-c[i-1][0])**2+(c[i][1]-c[i-1][1])**2);
    segs.push(d);tot+=d;
  }
  const tgt=f*tot;let acc=0;const r=[c[0]];
  for(let i=0;i<segs.length;i++){
    const rem=tgt-acc;
    if(rem<=segs[i]){
      const t=rem/segs[i];
      r.push([c[i][0]+t*(c[i+1][0]-c[i][0]),c[i][1]+t*(c[i+1][1]-c[i][1])]);
      break;
    }
    acc+=segs[i];r.push(c[i+1]);
  }
  return r;
}

/* ============ MAP INIT ============ */
function initMap(){
  map=new maplibregl.Map({
    container:'map',style:C.style,
    center:[11.4,47.26],zoom:10,pitch:0,bearing:0,
    attributionControl:true,dragRotate:false
  });
  return new Promise(r=>map.on('load',r));
}

/* ============ LAYERS ============ */
function addLayers(){
  const empty={type:'Feature',geometry:{type:'LineString',coordinates:[]}};
  map.addSource('glow',{type:'geojson',data:JSON.parse(JSON.stringify(empty))});
  map.addSource('line',{type:'geojson',data:JSON.parse(JSON.stringify(empty))});
  map.addSource('dot',{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:coords[0]}}});
  map.addLayer({id:'glow',type:'line',source:'glow',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':C.glowCol,'line-width':C.glowW,'line-blur':6}});
  map.addLayer({id:'line',type:'line',source:'line',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':C.lineCol,'line-width':C.lineW}});
  map.addLayer({id:'dot',type:'circle',source:'dot',
    paint:{'circle-radius':7,'circle-color':C.dotCol,
      'circle-stroke-width':2.5,'circle-stroke-color':'#fff','circle-blur':.15}});
}

/* ============ ANIMATION ============ */
function startAnim(){
  C.dur=parseInt(document.getElementById('opt-dur').value);
  C.pitch=parseInt(document.getElementById('opt-pitch').value);
  C.loop=document.getElementById('opt-loop').value==='1';
  const b=getBounds(coords);
  const br=getBearing(coords[0],coords[coords.length-1]);
  map.easeTo({pitch:C.pitch,bearing:br-15,duration:1500,easing:t=>t*(2-t)});
  map.fitBounds(b,{padding:C.pad,duration:1800,maxZoom:15});
  const info=analyze(coords);
  document.getElementById('s-d').textContent=info.km;
  document.getElementById('s-e').textContent=info.hm;
  setTimeout(()=>{
    document.getElementById('stats').classList.add('visible');
    animStart=null;
    requestAnimationFrame(tick);
  },2200);
}

function tick(ts){
  if(!animStart)animStart=ts;
  const elapsed=ts-animStart;
  let raw=Math.min(elapsed/C.dur,1);
  const t=raw<.5?2*raw*raw:-1+(4-2*raw)*raw;
  const sc=subLine(coords,t);
  const ld={type:'Feature',geometry:{type:'LineString',coordinates:sc}};
  map.getSource('glow').setData(ld);
  map.getSource('line').setData(ld);
  const tip=sc[sc.length-1];
  map.getSource('dot').setData({type:'Feature',geometry:{type:'Point',coordinates:tip}});
  if(C.rotDeg>0&&C.pitch>0){
    const br=getBearing(coords[0],coords[coords.length-1])-15;
    map.setBearing(br+t*C.rotDeg);
  }
  document.getElementById('prog').style.width=(t*100)+'%';
  if(raw<1){requestAnimationFrame(tick)}
  else{
    document.getElementById('prog').style.width='100%';
    if(C.loop) setTimeout(()=>{resetAnim();animStart=null;requestAnimationFrame(tick)},C.restPause);
  }
}

function resetAnim(){
  const e={type:'Feature',geometry:{type:'LineString',coordinates:[]}};
  map.getSource('glow').setData(e);
  map.getSource('line').setData(e);
  map.getSource('dot').setData({type:'Feature',geometry:{type:'Point',coordinates:coords[0]}});
  document.getElementById('prog').style.width='0%';
}

/* ============ COUNTDOWN ============ */
async function countdown(){
  const cd=document.getElementById('cd');
  const cn=document.getElementById('cd-n');
  cd.classList.add('vis');
  for(let i=3;i>=1;i--){
    cn.textContent=i;cn.style.animation='none';
    void cn.offsetWidth;cn.style.animation='cp .6s ease';
    await new Promise(r=>setTimeout(r,1000));
  }
  cd.classList.remove('vis');
}

/* ============ FILE INPUT ============ */
document.getElementById('gpx-input').addEventListener('change', async function(){
  const file=this.files&&this.files[0];
  if(!file) return;

  const info_el=document.getElementById('file-info');
  info_el.className='';
  info_el.textContent='Wird gelesen…';

  try{
    const txt=await file.text();
    coords=parseGPX(txt);
    const info=analyze(coords);
    info_el.className='success';
    info_el.textContent='✓ '+file.name+' · '+coords.length+' Pkt · '+info.km+' km · '+info.hm+' Hm';
    document.getElementById('options').classList.add('visible');
    document.getElementById('go-btn').classList.add('visible');
  }catch(err){
    info_el.className='error';
    info_el.textContent='✗ '+err.message;
    document.getElementById('options').classList.remove('visible');
    document.getElementById('go-btn').classList.remove('visible');
  }
});

/* ============ START ============ */
document.getElementById('go-btn').addEventListener('click', async function(){
  document.getElementById('setup').classList.add('hidden');
  if(!map){await initMap();addLayers();}
  document.getElementById('map').classList.add('visible');
  await new Promise(r=>setTimeout(r,600));
  await countdown();
  await new Promise(r=>setTimeout(r,800));
  startAnim();
});

document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
</script>
</body>
</html>
